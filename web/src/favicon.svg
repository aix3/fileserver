<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="folderGrad" x1="80" y1="140" x2="432" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="tabGrad" x1="80" y1="120" x2="230" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="256" y1="200" x2="256" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1E1B4B" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Folder body -->
  <g filter="url(#shadow)">
    <!-- Folder tab -->
    <path d="M96 172 L96 148 C96 134.745 106.745 124 120 124 L208 124 L232 164 L120 164 Z" fill="url(#tabGrad)"/>
    <!-- Folder main body -->
    <rect x="96" y="164" width="320" height="236" rx="24" fill="url(#folderGrad)"/>
    <!-- Folder front face with slight highlight -->
    <rect x="96" y="196" width="320" height="204" rx="24" fill="#F59E0B" opacity="0.6"/>
  </g>

  <!-- Upload arrow icon -->
  <g fill="url(#arrowGrad)">
    <!-- Arrow shaft -->
    <rect x="232" y="280" width="48" height="88" rx="10"/>
    <!-- Arrow head -->
    <path d="M256 228 L312 296 L200 296 Z"/>
  </g>

  <!-- Small connection dots (server feel) -->
  <circle cx="152" cy="370" r="10" fill="white" opacity="0.5"/>
  <circle cx="192" cy="370" r="10" fill="white" opacity="0.4"/>
  <circle cx="232" cy="370" r="10" fill="white" opacity="0.3"/>
</svg>
